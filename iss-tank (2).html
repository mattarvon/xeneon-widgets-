<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISS WASTE MONITOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #0d0d0d;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    overflow: hidden;
  }

  .shell {
    background: #111;
    border: 1.5px solid #2a2a1a;
    border-radius: 10px;
    padding: 14px 18px 12px;
    width: 98vw;
    height: 96vh;
    max-width: 780px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .title {
    font-size: 10px;
    letter-spacing: 4px;
    color: #444;
    text-transform: uppercase;
  }

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #003300;
    transition: background 0.5s, box-shadow 0.5s;
    flex-shrink: 0;
  }
  .status-dot.live {
    background: #00cc00;
    box-shadow: 0 0 7px #00cc00;
    animation: pulse 2s infinite;
  }
  .status-dot.error { background: #cc3300; box-shadow: 0 0 7px #cc3300; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .main-panel {
    display: flex;
    gap: 18px;
    flex: 1;
    min-height: 0;
  }

  /* ---- TANK ---- */
  .tank-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    justify-content: center;
  }

  .tank-cap {
    width: 38px; height: 12px;
    border: 2px solid #3a3a22;
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    background: #1a1a10;
  }

  .tank-outer {
    width: 70px;
    flex: 1;
    max-height: 220px;
    border: 2px solid #4a4a28;
    border-radius: 6px 6px 10px 10px;
    background: #080802;
    position: relative;
    overflow: hidden;
  }

  .tank-glass-sheen {
    position: absolute;
    top: 0; left: 5px;
    width: 8px; height: 100%;
    background: rgba(255,255,180,0.025);
    border-radius: 6px;
    pointer-events: none;
    z-index: 10;
  }

  .tick { position: absolute; right: 6px; width: 10px; height: 1px; background: #2a2a14; }
  .tick-label {
    position: absolute; right: 20px;
    font-size: 10px; color: #2e2e14;
    line-height: 1; transform: translateY(-50%);
  }

  .urine-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    transition: height 1.4s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
  }
  .urine-body {
    position: absolute; bottom: 0; left: 0; right: 0; top: 18px;
    background: #c8a000;
  }
  .wave-svg {
    position: absolute; top: 0; left: -50%; width: 200%; height: 20px;
    animation: wave 2.8s linear infinite;
  }
  .wave-svg.wave2 {
    top: 4px;
    animation: wave 3.6s linear infinite reverse;
    opacity: 0.5;
  }
  @keyframes wave { from{transform:translateX(0)} to{transform:translateX(50%)} }

  .foam-dot {
    position: absolute; border-radius: 50%;
    background: rgba(255,240,100,0.22);
    animation: floatdot 4s ease-in-out infinite;
  }
  @keyframes floatdot {
    0%,100%{transform:translateX(0) translateY(0)}
    33%{transform:translateX(4px) translateY(-3px)}
    66%{transform:translateX(-3px) translateY(-5px)}
  }

  .tank-label {
    font-size: 11px; color: #554400; letter-spacing: 2px;
  }

  /* ---- RIGHT PANEL ---- */
  .info-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-width: 0;
  }

  .section-label {
    font-size: 11px; color: #3a2a00;
    letter-spacing: 3px; text-transform: uppercase;
    margin-bottom: 4px;
  }

  .big-pct {
    font-size: clamp(64px, 14vw, 110px);
    line-height: 1;
    letter-spacing: -3px;
    color: #c8a000;
    text-shadow: 0 0 14px rgba(200,160,0,0.45), 0 0 4px #ffcc00;
    transition: color 0.8s, text-shadow 0.8s;
  }
  .big-pct.warn {
    color: #e06000;
    text-shadow: 0 0 14px rgba(220,100,0,0.5), 0 0 4px #ff8800;
  }
  .big-pct.crit {
    color: #cc2200;
    text-shadow: 0 0 16px rgba(200,30,0,0.65), 0 0 5px #ff4400;
    animation: flashred 1s step-end infinite;
  }
  @keyframes flashred { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .pct-sym {
    font-size: clamp(28px, 5vw, 42px);
    letter-spacing: 0;
  }

  .divider { height: 1px; background: #1e1a06; }

  .bar-section { display: flex; flex-direction: column; gap: 4px; }

  .bar-track {
    height: 8px; background: #100d00; border-radius: 4px;
    position: relative; overflow: hidden;
  }
  .bar-fill {
    height: 100%; background: #c8a000; border-radius: 4px;
    transition: width 1.4s ease, background 0.8s;
    box-shadow: 0 0 6px rgba(200,160,0,0.5);
  }
  .bar-fill.warn { background: #e06000; box-shadow: 0 0 6px rgba(220,100,0,0.5); }
  .bar-fill.crit { background: #cc2200; box-shadow: 0 0 6px rgba(200,30,0,0.5); }

  .bar-markers { display: flex; justify-content: space-between; }
  .bar-mark { font-size: 10px; color: #2a2000; }

  .meta-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 3px 12px;
    align-items: center;
  }
  .meta-key { font-size: 10px; color: #2e2000; letter-spacing: 2px; white-space: nowrap; }
  .meta-val { font-size: 11px; color: #887700; letter-spacing: 1px; }

  .status-text {
    font-size: 11px; letter-spacing: 3px;
    color: #2a2000; min-height: 14px;
    text-transform: uppercase;
  }
  .status-text.live-txt { color: #887700; }
  .status-text.err-txt  { color: #aa3300; }

  .scanlines {
    position: absolute; inset: 0; border-radius: 10px; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
    );
  }
</style>
</head>
<body>
<div class="shell">
  <div class="scanlines"></div>

  <div class="top-bar">
    <div class="title">ISS NODE 3 &mdash; URINE MONITOR</div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="main-panel">

    <div class="tank-wrap">
      <div class="tank-cap"></div>
      <div class="tank-outer">
        <div class="tank-glass-sheen"></div>
        <div class="tick" style="bottom:75%"></div><div class="tick-label" style="bottom:75%">75</div>
        <div class="tick" style="bottom:50%"></div><div class="tick-label" style="bottom:50%">50</div>
        <div class="tick" style="bottom:25%"></div><div class="tick-label" style="bottom:25%">25</div>
        <div class="urine-fill" id="urineFill" style="height:0%">
          <svg class="wave-svg" viewBox="0 0 200 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 10 Q25 3 50 10 Q75 17 100 10 Q125 3 150 10 Q175 17 200 10 L200 20 L0 20 Z" fill="#e0b800"/>
          </svg>
          <svg class="wave-svg wave2" viewBox="0 0 200 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 10 Q25 17 50 10 Q75 3 100 10 Q125 17 150 10 Q175 3 200 10 L200 20 L0 20 Z" fill="#c8a000"/>
          </svg>
          <div class="urine-body"></div>
          <div class="foam-dot" style="width:7px;height:7px;top:22px;left:12px;animation-delay:0s"></div>
          <div class="foam-dot" style="width:4px;height:4px;top:25px;left:38px;animation-delay:1.3s"></div>
          <div class="foam-dot" style="width:5px;height:5px;top:21px;left:54px;animation-delay:0.7s"></div>
        </div>
      </div>
      <div class="tank-label" id="tankLabel">--%</div>
    </div>

    <div class="info-panel">

      <div>
        <div class="section-label">URINE TANK / UPA PRETREAT</div>
        <div>
          <span class="big-pct" id="bigPct">--</span><span class="big-pct pct-sym" id="bigPctSym">%</span>
        </div>
      </div>

      <div class="divider"></div>

      <div class="bar-section">
        <div class="bar-track">
          <div class="bar-fill" id="barFill" style="width:0%"></div>
        </div>
        <div class="bar-markers">
          <span class="bar-mark">0</span>
          <span class="bar-mark">25</span>
          <span class="bar-mark">50</span>
          <span class="bar-mark">75</span>
          <span class="bar-mark">100</span>
        </div>
      </div>

      <div class="meta-grid">
        <span class="meta-key">PARAM</span>    <span class="meta-val">NODE3000005</span>
        <span class="meta-key">SOURCE</span>   <span class="meta-val">NASA / LIGHTSTREAMER</span>
        <span class="meta-key">UPDATED</span>  <span class="meta-val" id="lastUpdate">--:--:--</span>
      </div>

      <div class="status-text" id="statusText">CONNECTING...</div>

    </div>
  </div>
</div>

<script src="https://unpkg.com/lightstreamer-client-web/lightstreamer.min.js"></script>
<script>
  function setLevel(pct) {
    pct = Math.min(100, Math.max(0, Math.round(pct * 10) / 10));
    const warn = pct >= 70, crit = pct >= 90;
    const cls  = crit ? ' crit' : warn ? ' warn' : '';

    document.getElementById('bigPct').textContent      = pct.toFixed(1);
    document.getElementById('bigPct').className        = 'big-pct' + cls;
    document.getElementById('bigPctSym').className     = 'big-pct pct-sym' + cls;
    document.getElementById('urineFill').style.height  = pct + '%';
    document.getElementById('barFill').style.width     = pct + '%';
    document.getElementById('barFill').className       = 'bar-fill' + cls;
    document.getElementById('tankLabel').textContent   = pct.toFixed(1) + '%';
    document.getElementById('lastUpdate').textContent  = new Date().toTimeString().slice(0,8);

    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    dot.className = 'status-dot live';
    txt.className = 'status-text live-txt';
    txt.textContent = crit ? 'CRITICAL \u2014 DUMP REQUIRED'
                   : warn  ? 'WARNING \u2014 APPROACHING CAPACITY'
                           : 'LIVE TELEMETRY \u2014 NOMINAL';
  }

  function setError(msg) {
    document.getElementById('statusDot').className  = 'status-dot error';
    document.getElementById('statusText').className = 'status-text err-txt';
    document.getElementById('statusText').textContent = msg;
  }

  try {
    const client = new LightstreamerClient('https://push.lightstreamer.com', 'ISSLIVE');
    client.addListener({
      onStatusChange: function(s) {
        if (s.indexOf('DISCONNECTED') >= 0) setError('SIGNAL LOST');
      }
    });
    client.connect();

    const sub = new Subscription('MERGE', ['NODE3000005'], ['Value', 'Status.Class']);
    sub.setDataAdapter('DEFAULT');
    sub.setRequestedSnapshot('yes');
    sub.addListener({
      onItemUpdate: function(update) {
        const raw = update.getValue('Value');
        if (raw !== null && raw !== undefined && !isNaN(parseFloat(raw))) {
          setLevel(parseFloat(raw));
        }
      },
      onSubscriptionError: function(code) { setError('ERR ' + code); }
    });
    client.subscribe(sub);
  } catch(e) {
    setError('INIT ERROR');
  }
</script>
</body>
</html>
