<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISS WASTE MONITOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0d0d0d; width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    overflow: hidden;
  }
  .shell {
    background: #111; border: 1.5px solid #2a2a1a;
    border-radius: 10px; padding: 12px 16px;
    width: 98vw; height: 96vh; max-width: 780px;
    position: relative; display: flex; flex-direction: column; gap: 8px;
  }
  .top-bar { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .title { font-size: 12px; letter-spacing: 3px; color: #444; text-transform: uppercase; }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%; background: #003300;
    transition: background 0.5s, box-shadow 0.5s;
  }
  .status-dot.live { background: #00cc00; box-shadow: 0 0 7px #00cc00; animation: pulse 2s infinite; }
  .status-dot.error { background: #cc3300; box-shadow: 0 0 7px #cc3300; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  .main-row { display: flex; gap: 10px; flex: 1; min-height: 0; }

  /* TANK */
  .tank-col {
    display: flex; flex-direction: column; align-items: center;
    gap: 6px; flex-shrink: 0; justify-content: center;
  }
  .tank-cap {
    width: 38px; height: 11px;
    border: 2px solid #3a3a22; border-bottom: none;
    border-radius: 4px 4px 0 0; background: #1a1a10;
  }
  .tank-outer {
    width: 68px; flex: 1; max-height: 210px;
    border: 2px solid #4a4a28; border-radius: 6px 6px 10px 10px;
    background: #080802; position: relative; overflow: hidden;
  }
  .glass-sheen {
    position: absolute; top: 0; left: 5px; width: 8px; height: 100%;
    background: rgba(255,255,180,0.025); border-radius: 6px;
    pointer-events: none; z-index: 10;
  }
  .tick { position: absolute; right: 5px; width: 10px; height: 1px; background: #2a2a14; }
  .tick-label { position: absolute; right: 18px; font-size: 11px; color: #2e2e14; line-height: 1; transform: translateY(-50%); }
  .urine-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    transition: height 1.4s cubic-bezier(0.4,0,0.2,1); overflow: hidden;
  }
  .urine-body { position: absolute; bottom: 0; left: 0; right: 0; top: 18px; background: #c8a000; }
  .wave-svg { position: absolute; top: 0; left: -50%; width: 200%; height: 20px; animation: wave 2.8s linear infinite; }
  .wave-svg.w2 { top: 4px; animation: wave 3.6s linear infinite reverse; opacity: 0.5; }
  @keyframes wave { from{transform:translateX(0)} to{transform:translateX(50%)} }
  .foam { position: absolute; border-radius: 50%; background: rgba(255,240,100,0.22); animation: floatdot 4s ease-in-out infinite; }
  @keyframes floatdot { 0%,100%{transform:translate(0,0)} 33%{transform:translate(4px,-3px)} 66%{transform:translate(-3px,-5px)} }
  .tank-pct { font-size: 14px; color: #665500; letter-spacing: 2px; }

  /* RIGHT COLUMN */
  .right-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 8px; }

  /* READOUT */
  .readout-panel {
    background: #0a0a02; border: 1px solid #2a2a10;
    border-radius: 6px; padding: 10px 14px; flex-shrink: 0;
  }
  .readout-label { font-size: 12px; color: #3a2a00; letter-spacing: 3px; margin-bottom: 4px; }
  .big-pct {
    font-size: clamp(54px, 12vw, 98px); line-height: 1; letter-spacing: -2px;
    color: #c8a000;
    text-shadow: 0 0 14px rgba(200,160,0,0.45), 0 0 4px #ffcc00;
    transition: color 0.8s, text-shadow 0.8s;
  }
  .big-pct.warn { color: #e06000; text-shadow: 0 0 14px rgba(220,100,0,0.5), 0 0 4px #ff8800; }
  .big-pct.crit { color: #cc2200; text-shadow: 0 0 16px rgba(200,30,0,0.65); animation: flashred 1s step-end infinite; }
  @keyframes flashred { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .pct-sym { font-size: clamp(28px, 5vw, 44px); }
  .status-text { font-size: 13px; letter-spacing: 2px; color: #443300; margin-top: 4px; min-height: 16px; }
  .status-text.live-txt { color: #887700; }
  .status-text.err-txt  { color: #aa3300; }

  .bar-track { height: 8px; background: #100d00; border-radius: 4px; margin-top: 6px; }
  .bar-fill {
    height: 100%; background: #c8a000; border-radius: 4px;
    transition: width 1.4s ease, background 0.8s;
    box-shadow: 0 0 6px rgba(200,160,0,0.5);
  }
  .bar-fill.warn { background: #e06000; box-shadow: 0 0 6px rgba(220,100,0,0.5); }
  .bar-fill.crit { background: #cc2200; box-shadow: 0 0 6px rgba(200,30,0,0.5); }
  .bar-markers { display: flex; justify-content: space-between; margin-top: 3px; }
  .bar-mark { font-size: 11px; color: #2a2000; }

  /* ORBITAL */
  .orbital-panel {
    background: #020a0a; border: 1px solid #102a2a;
    border-radius: 6px; padding: 10px 14px;
    flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 5px;
  }
  .orb-header { display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .orb-label { font-size: 12px; color: #0e3a3a; letter-spacing: 3px; }
  .orb-dot { width: 8px; height: 8px; border-radius: 50%; background: #001a1a; transition: background 0.5s, box-shadow 0.5s; }
  .orb-dot.live { background: #00aacc; box-shadow: 0 0 6px #00aacc; animation: pulse 2s infinite; }

  .orb-arc-wrap { flex-shrink: 0; }

  .orb-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 5px 10px; flex: 1; align-content: center;
  }
  .orb-item { display: flex; flex-direction: column; gap: 2px; }
  .orb-key  { font-size: 12px; color: #0e3a3a; letter-spacing: 2px; }
  .orb-val  {
    font-size: clamp(14px, 2.6vw, 20px); color: #00aacc; letter-spacing: 1px;
    text-shadow: 0 0 5px rgba(0,170,200,0.4);
  }

  .crew-row { display: flex; align-items: center; gap: 10px; flex-shrink: 0; padding-top: 5px; border-top: 1px solid #0a2020; }
  .crew-label { font-size: 12px; color: #0e3a3a; letter-spacing: 2px; }
  .crew-icons { display: flex; gap: 4px; }
  .crew-icon {
    width: 16px; height: 16px; border-radius: 50%;
    background: #003a3a; border: 1px solid #00aacc;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: #00aacc;
    box-shadow: 0 0 4px rgba(0,170,200,0.3);
  }
  .crew-count {
    font-size: clamp(14px, 2.4vw, 19px); color: #00aacc;
    text-shadow: 0 0 5px rgba(0,170,200,0.4); letter-spacing: 1px;
  }
  .orb-status { font-size: 11px; color: #0e2a2a; letter-spacing: 2px; flex-shrink: 0; }

  .meta-row { display: flex; gap: 14px; flex-shrink: 0; flex-wrap: wrap; }
  .meta-key { font-size: 11px; color: #2a2000; letter-spacing: 2px; }
  .meta-val { font-size: 12px; color: #554400; letter-spacing: 1px; }

  .scanlines {
    position: absolute; inset: 0; border-radius: 10px; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom, transparent 0px, transparent 3px,
      rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
    );
  }
</style>
</head>
<body>
<div class="shell">
  <div class="scanlines"></div>
  <div class="top-bar">
    <div class="title">ISS NODE 3 &mdash; WASTE SYSTEMS MONITOR</div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="main-row">
    <div class="tank-col">
      <div class="tank-cap"></div>
      <div class="tank-outer">
        <div class="glass-sheen"></div>
        <div class="tick" style="bottom:75%"></div><div class="tick-label" style="bottom:75%">75</div>
        <div class="tick" style="bottom:50%"></div><div class="tick-label" style="bottom:50%">50</div>
        <div class="tick" style="bottom:25%"></div><div class="tick-label" style="bottom:25%">25</div>
        <div class="urine-fill" id="urineFill" style="height:0%">
          <svg class="wave-svg" viewBox="0 0 200 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 10 Q25 3 50 10 Q75 17 100 10 Q125 3 150 10 Q175 17 200 10 L200 20 L0 20 Z" fill="#e0b800"/>
          </svg>
          <svg class="wave-svg w2" viewBox="0 0 200 20" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 10 Q25 17 50 10 Q75 3 100 10 Q125 17 150 10 Q175 3 200 10 L200 20 L0 20 Z" fill="#c8a000"/>
          </svg>
          <div class="urine-body"></div>
          <div class="foam" style="width:7px;height:7px;top:22px;left:12px;animation-delay:0s"></div>
          <div class="foam" style="width:4px;height:4px;top:26px;left:40px;animation-delay:1.3s"></div>
          <div class="foam" style="width:5px;height:5px;top:21px;left:54px;animation-delay:0.7s"></div>
        </div>
      </div>
      <div class="tank-pct" id="tankPct">--%</div>
    </div>

    <div class="right-col">
      <div class="readout-panel">
        <div class="readout-label">URINE TANK / UPA PRETREAT / NODE3000005</div>
        <div>
          <span class="big-pct" id="bigPct">--</span><span class="big-pct pct-sym" id="bigPctSym">%</span>
        </div>
        <div class="bar-track"><div class="bar-fill" id="barFill" style="width:0%"></div></div>
        <div class="bar-markers">
          <span class="bar-mark">0</span><span class="bar-mark">25</span>
          <span class="bar-mark">50</span><span class="bar-mark">75</span><span class="bar-mark">100</span>
        </div>
        <div class="status-text" id="statusText">CONNECTING TO LIGHTSTREAMER...</div>
      </div>

      <div class="orbital-panel">
        <div class="orb-header">
          <div class="orb-label">ISS ORBITAL TELEMETRY</div>
          <div class="orb-dot" id="orbDot"></div>
        </div>

        <div class="orb-arc-wrap">
          <svg width="100%" viewBox="0 0 300 72" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="150" cy="60" rx="132" ry="48" fill="none" stroke="#0a2a2a" stroke-width="1.5"/>
            <ellipse cx="150" cy="60" rx="132" ry="48" fill="none" stroke="#003a3a" stroke-width="0.5" stroke-dasharray="4 4"/>
            <ellipse cx="150" cy="22" rx="15" ry="9" fill="#001a10" stroke="#006600" stroke-width="1"/>
            <text x="150" y="25.5" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="8" fill="#009900">EARTH</text>
            <circle id="issOrb" cx="150" cy="12" r="5" fill="#002a2a" stroke="#00aacc" stroke-width="1.5"/>
            <text id="issOrbTxt" x="150" y="6" text-anchor="middle" font-family="Share Tech Mono,monospace" font-size="8" fill="#00aacc">ISS</text>
          </svg>
        </div>

        <div class="orb-grid">
          <div class="orb-item"><span class="orb-key">ALTITUDE</span><span class="orb-val" id="orbAlt">-- KM</span></div>
          <div class="orb-item"><span class="orb-key">VELOCITY</span><span class="orb-val" id="orbVel">-- KM/S</span></div>
          <div class="orb-item"><span class="orb-key">LATITUDE</span><span class="orb-val" id="orbLat">--&deg;</span></div>
          <div class="orb-item"><span class="orb-key">LONGITUDE</span><span class="orb-val" id="orbLon">--&deg;</span></div>
        </div>

        <div class="crew-row">
          <span class="orb-key">CREW</span>
          <div class="crew-icons" id="crewIcons"></div>
          <span class="crew-count" id="crewCount">-- ABOARD</span>
        </div>
        <div class="orb-status" id="orbStatus">FETCHING ORBITAL DATA...</div>
      </div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lightstreamer-client-web/lightstreamer.min.js"></script>
<script>
  function setLevel(pct) {
    pct = Math.min(100, Math.max(0, Math.round(pct * 10) / 10));
    const warn = pct >= 70, crit = pct >= 90, cls = crit?' crit':warn?' warn':'';
    document.getElementById('bigPct').textContent      = pct.toFixed(1);
    document.getElementById('bigPct').className        = 'big-pct' + cls;
    document.getElementById('bigPctSym').className     = 'big-pct pct-sym' + cls;
    document.getElementById('urineFill').style.height  = pct + '%';
    document.getElementById('barFill').style.width     = pct + '%';
    document.getElementById('barFill').className       = 'bar-fill' + cls;
    document.getElementById('tankPct').textContent     = pct.toFixed(1) + '%';
    document.getElementById('statusDot').className     = 'status-dot live';
    const txt = document.getElementById('statusText');
    txt.className   = 'status-text live-txt';
    txt.textContent = crit ? 'CRITICAL \u2014 DUMP REQUIRED'
                   : warn  ? 'WARNING \u2014 APPROACHING CAPACITY'
                           : 'LIVE TELEMETRY \u2014 NOMINAL';
  }
  function setTankErr(msg) {
    document.getElementById('statusDot').className  = 'status-dot error';
    document.getElementById('statusText').className = 'status-text err-txt';
    document.getElementById('statusText').textContent = msg;
  }

  try {
    const client = new LightstreamerClient('https://push.lightstreamer.com', 'ISSLIVE');
    client.addListener({ onStatusChange: s => { if (s.indexOf('DISCONNECTED')>=0) setTankErr('SIGNAL LOST'); } });
    client.connect();
    const sub = new Subscription('MERGE',['NODE3000005'],['Value','Status.Class']);
    sub.setDataAdapter('DEFAULT'); sub.setRequestedSnapshot('yes');
    sub.addListener({
      onItemUpdate: u => { const r=u.getValue('Value'); if (r!==null&&!isNaN(parseFloat(r))) setLevel(parseFloat(r)); },
      onSubscriptionError: code => setTankErr('ERR '+code)
    });
    client.subscribe(sub);
  } catch(e) { setTankErr('INIT ERROR'); }

  function updateOrbArc(lat) {
    const cx=150, cy=60, rx=132, ry=48;
    const angle = ((lat/90)*70)-90;
    const rad = angle*Math.PI/180;
    const x = (cx+rx*Math.cos(rad)).toFixed(1), y = (cy+ry*Math.sin(rad)).toFixed(1);
    document.getElementById('issOrb').setAttribute('cx', x);
    document.getElementById('issOrb').setAttribute('cy', y);
    document.getElementById('issOrbTxt').setAttribute('x', x);
    document.getElementById('issOrbTxt').setAttribute('y', (parseFloat(y)-9).toFixed(1));
  }

  function fetchOrbit() {
    fetch('https://api.wheretheiss.at/v1/satellites/25544')
      .then(r=>r.json()).then(d=>{
        const latDir = d.latitude>=0?'N':'S', lonDir = d.longitude>=0?'E':'W';
        document.getElementById('orbAlt').textContent = Math.round(d.altitude)+' KM';
        document.getElementById('orbVel').textContent = (d.velocity/3600).toFixed(2)+' KM/S';
        document.getElementById('orbLat').textContent = Math.abs(d.latitude).toFixed(2)+'\u00b0'+latDir;
        document.getElementById('orbLon').textContent = Math.abs(d.longitude).toFixed(2)+'\u00b0'+lonDir;
        document.getElementById('orbDot').className   = 'orb-dot live';
        document.getElementById('orbStatus').textContent = 'UPDATED '+new Date().toTimeString().slice(0,8);
        updateOrbArc(d.latitude);
      }).catch(()=>{ document.getElementById('orbStatus').textContent='ORBITAL FEED UNAVAILABLE'; });
  }

  function fetchCrew() {
    fetch('http://api.open-notify.org/astros.json')
      .then(r=>r.json()).then(d=>{
        const iss = d.people.filter(p=>p.craft==='ISS');
        document.getElementById('crewCount').textContent = iss.length+' ABOARD';
        const icons = document.getElementById('crewIcons');
        icons.innerHTML='';
        iss.slice(0,10).forEach(()=>{
          const el=document.createElement('div');
          el.className='crew-icon'; el.textContent='\u25c9'; icons.appendChild(el);
        });
      }).catch(()=>{ document.getElementById('crewCount').textContent='-- ABOARD'; });
  }

  fetchOrbit(); fetchCrew();
  setInterval(fetchOrbit, 5000);
  setInterval(fetchCrew, 60000);
</script>
</body>
</html>
