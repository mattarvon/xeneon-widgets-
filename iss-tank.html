<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISS WASTE MONITOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #0d0d0d;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    overflow: hidden;
  }

  .shell {
    background: #111;
    border: 1.5px solid #2a2a2a;
    border-radius: 10px;
    padding: 14px 16px 14px;
    width: 98vw;
    max-width: 500px;
    position: relative;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .title {
    font-size: 9px;
    letter-spacing: 3px;
    color: #444;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #003300;
    transition: background 0.5s, box-shadow 0.5s;
  }
  .status-dot.live {
    background: #00cc00;
    box-shadow: 0 0 6px #00cc00;
    animation: pulse 2s infinite;
  }
  .status-dot.error {
    background: #cc3300;
    box-shadow: 0 0 6px #cc3300;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .main-panel {
    display: flex;
    gap: 14px;
    align-items: stretch;
  }

  /* ---- TANK VISUAL ---- */
  .tank-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .tank-outer {
    width: 52px;
    height: 140px;
    border: 2px solid #2a5a2a;
    border-radius: 6px 6px 4px 4px;
    background: #060f06;
    position: relative;
    overflow: hidden;
  }

  .tank-cap {
    width: 28px;
    height: 8px;
    border: 2px solid #2a5a2a;
    border-bottom: none;
    border-radius: 3px 3px 0 0;
    background: #0a1a0a;
    margin: 0 auto;
    position: relative;
    top: -9px;
  }

  .tank-fill {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #d4b800;
    transition: height 1.2s ease;
    box-shadow: 0 -2px 8px rgba(212,184,0,0.4);
  }

  .tank-fill-shimmer {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255,240,100,0.5);
    border-radius: 1px;
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.9; }
  }

  /* tick marks on tank */
  .tick {
    position: absolute;
    right: 4px;
    width: 7px;
    height: 1px;
    background: #1a3a1a;
  }
  .tick-label {
    position: absolute;
    right: 14px;
    font-size: 8px;
    color: #1e4a1e;
    line-height: 1;
    transform: translateY(-50%);
  }

  .tank-pct {
    font-size: 11px;
    color: #888;
    letter-spacing: 1px;
  }

  /* ---- RIGHT PANEL ---- */
  .info-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
    justify-content: center;
  }

  .big-pct {
    font-size: 58px;
    line-height: 1;
    letter-spacing: -2px;
    color: #d4b800;
    text-shadow: 0 0 12px rgba(212,184,0,0.5), 0 0 3px #ffee00;
    transition: color 0.8s, text-shadow 0.8s;
  }

  .big-pct.warn {
    color: #ff6600;
    text-shadow: 0 0 12px rgba(255,100,0,0.5), 0 0 3px #ff8800;
  }

  .big-pct.crit {
    color: #ff2200;
    text-shadow: 0 0 14px rgba(255,30,0,0.6), 0 0 4px #ff4400;
    animation: flashred 1s step-end infinite;
  }

  @keyframes flashred {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .pct-symbol {
    font-size: 28px;
    color: inherit;
    margin-left: 2px;
  }

  .label-row {
    font-size: 10px;
    color: #3a6a3a;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .divider {
    height: 1px;
    background: #1a2a1a;
    margin: 2px 0;
  }

  .meta-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .meta-line {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .meta-key {
    font-size: 9px;
    color: #2a5a2a;
    letter-spacing: 2px;
  }

  .meta-val {
    font-size: 10px;
    color: #5a9a5a;
    letter-spacing: 1px;
  }

  .bar-track {
    height: 4px;
    background: #0d200d;
    border-radius: 2px;
    margin-top: 6px;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    background: #d4b800;
    border-radius: 2px;
    transition: width 1.2s ease, background 0.8s;
    box-shadow: 0 0 4px rgba(212,184,0,0.5);
  }

  .bar-fill.warn { background: #ff6600; box-shadow: 0 0 4px rgba(255,100,0,0.5); }
  .bar-fill.crit { background: #ff2200; box-shadow: 0 0 4px rgba(255,30,0,0.5); }

  .bar-markers {
    display: flex;
    justify-content: space-between;
    margin-top: 2px;
  }

  .bar-mark {
    font-size: 8px;
    color: #1e3a1e;
    letter-spacing: 0;
  }

  .status-text {
    font-size: 9px;
    letter-spacing: 2px;
    color: #2a5a2a;
    margin-top: 2px;
    min-height: 12px;
    transition: color 0.3s;
  }

  .status-text.live-txt { color: #00aa00; }
  .status-text.err-txt  { color: #aa3300; }

  .scanlines {
    position: absolute;
    inset: 0;
    border-radius: 10px;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px, transparent 3px,
      rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px
    );
  }
</style>
</head>
<body>

<div class="shell">
  <div class="scanlines"></div>

  <div class="top-bar">
    <div class="title">ISS NODE 3 — URINE MONITOR</div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="main-panel">

    <div class="tank-wrap">
      <div class="tank-cap"></div>
      <div class="tank-outer" id="tankOuter">
        <!-- tick marks -->
        <div class="tick" style="bottom:75%; "></div>
        <div class="tick-label" style="bottom:75%;">75</div>
        <div class="tick" style="bottom:50%;"></div>
        <div class="tick-label" style="bottom:50%;">50</div>
        <div class="tick" style="bottom:25%;"></div>
        <div class="tick-label" style="bottom:25%;">25</div>

        <div class="tank-fill" id="tankFill" style="height:0%">
          <div class="tank-fill-shimmer"></div>
        </div>
      </div>
      <div class="tank-pct" id="tankPctSmall">--%</div>
    </div>

    <div class="info-panel">
      <div>
        <div class="label-row">URINE TANK</div>
        <div class="label-row" style="font-size:8px; color:#1e3a1e; margin-top:2px;">NODE3 / UPA PRETREAT</div>
      </div>

      <div>
        <span class="big-pct" id="bigPct">--</span><span class="big-pct pct-symbol" id="bigPctSym">%</span>
      </div>

      <div class="divider"></div>

      <div class="bar-track">
        <div class="bar-fill" id="barFill" style="width:0%"></div>
      </div>
      <div class="bar-markers">
        <span class="bar-mark">0</span>
        <span class="bar-mark">25</span>
        <span class="bar-mark">50</span>
        <span class="bar-mark">75</span>
        <span class="bar-mark">100</span>
      </div>

      <div class="meta-row">
        <div class="meta-line">
          <span class="meta-key">PARAM</span>
          <span class="meta-val">NODE3000005</span>
        </div>
        <div class="meta-line">
          <span class="meta-key">SOURCE</span>
          <span class="meta-val">NASA / LIGHTSTREAMER</span>
        </div>
        <div class="meta-line">
          <span class="meta-key">UPDATED</span>
          <span class="meta-val" id="lastUpdate">--:--:--</span>
        </div>
      </div>

      <div class="status-text" id="statusText">CONNECTING...</div>
    </div>

  </div>
</div>

<script src="https://unpkg.com/lightstreamer-client-web/lightstreamer.min.js"></script>
<script>
  function setLevel(pct) {
    pct = Math.min(100, Math.max(0, Math.round(pct * 10) / 10));

    const bigEl   = document.getElementById('bigPct');
    const bigSym  = document.getElementById('bigPctSym');
    const fill    = document.getElementById('tankFill');
    const bar     = document.getElementById('barFill');
    const small   = document.getElementById('tankPctSmall');
    const dot     = document.getElementById('statusDot');
    const txt     = document.getElementById('statusText');
    const now     = new Date();

    bigEl.textContent  = pct.toFixed(1);
    small.textContent  = pct.toFixed(1) + '%';
    fill.style.height  = pct + '%';
    bar.style.width    = pct + '%';

    const timeStr = now.toTimeString().slice(0,8);
    document.getElementById('lastUpdate').textContent = timeStr;

    const warn = pct >= 70;
    const crit = pct >= 90;

    bigEl.className  = 'big-pct' + (crit ? ' crit' : warn ? ' warn' : '');
    bigSym.className = 'big-pct pct-symbol' + (crit ? ' crit' : warn ? ' warn' : '');
    bar.className    = 'bar-fill' + (crit ? ' crit' : warn ? ' warn' : '');

    dot.className  = 'status-dot live';
    txt.className  = 'status-text live-txt';
    txt.textContent = crit ? 'CRITICAL — DUMP REQUIRED'
                   : warn  ? 'WARNING — APPROACHING CAPACITY'
                           : 'LIVE TELEMETRY — NOMINAL';
  }

  function setError(msg) {
    document.getElementById('statusDot').className = 'status-dot error';
    document.getElementById('statusText').className = 'status-text err-txt';
    document.getElementById('statusText').textContent = msg;
  }

  try {
    const client = new LightstreamerClient('https://push.lightstreamer.com', 'ISSLIVE');

    client.addListener({
      onStatusChange: function(status) {
        if (status.indexOf('CONNECTED') === -1 && status.indexOf('DISCONNECTED') >= 0) {
          setError('SIGNAL LOST');
        }
      }
    });

    client.connect();

    const sub = new Subscription(
      'MERGE',
      ['NODE3000005'],
      ['Value', 'Status.Class']
    );

    sub.setDataAdapter('DEFAULT');
    sub.setRequestedSnapshot('yes');

    sub.addListener({
      onItemUpdate: function(update) {
        const raw = update.getValue('Value');
        if (raw !== null && raw !== undefined && !isNaN(parseFloat(raw))) {
          setLevel(parseFloat(raw));
        }
      },
      onSubscriptionError: function(code, msg) {
        setError('SUBSCRIPTION ERR: ' + code);
      }
    });

    client.subscribe(sub);

  } catch(e) {
    setError('INIT ERROR');
  }
</script>

</body>
</html>
