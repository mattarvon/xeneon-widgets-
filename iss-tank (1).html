<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISS WASTE MONITOR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #0d0d0d;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    overflow: hidden;
  }

  .shell {
    background: #111;
    border: 1.5px solid #2a2a2a;
    border-radius: 10px;
    padding: 14px 16px;
    width: 98vw;
    max-width: 500px;
    position: relative;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .title { font-size: 9px; letter-spacing: 3px; color: #444; text-transform: uppercase; }

  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #003300;
    transition: background 0.5s, box-shadow 0.5s;
  }
  .status-dot.live {
    background: #00cc00;
    box-shadow: 0 0 6px #00cc00;
    animation: pulse 2s infinite;
  }
  .status-dot.error { background: #cc3300; box-shadow: 0 0 6px #cc3300; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .main-panel { display: flex; gap: 14px; align-items: stretch; }

  .tank-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; flex-shrink: 0; }

  .tank-cap {
    width: 26px; height: 8px;
    border: 2px solid #3a3a2a;
    border-bottom: none;
    border-radius: 3px 3px 0 0;
    background: #1a1a10;
  }

  .tank-outer {
    width: 54px; height: 148px;
    border: 2px solid #4a4a2a;
    border-radius: 5px 5px 8px 8px;
    background: #0a0a05;
    position: relative;
    overflow: hidden;
  }

  .tank-glass-sheen {
    position: absolute;
    top: 0; left: 4px;
    width: 6px; height: 100%;
    background: rgba(255,255,200,0.03);
    border-radius: 4px;
    pointer-events: none;
    z-index: 10;
  }

  .tick { position: absolute; right: 5px; width: 8px; height: 1px; background: #2a2a15; }
  .tick-label { position: absolute; right: 16px; font-size: 8px; color: #2a2a15; line-height: 1; transform: translateY(-50%); }

  .urine-fill {
    position: absolute; bottom: 0; left: 0; right: 0;
    transition: height 1.4s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
  }

  .urine-body {
    position: absolute; bottom: 0; left: 0; right: 0; top: 14px;
    background: #c8a000;
  }

  .wave-svg {
    position: absolute; top: 0; left: -50%; width: 200%; height: 16px;
    animation: wave 2.8s linear infinite;
  }
  .wave-svg.wave2 {
    top: 3px;
    animation: wave 3.6s linear infinite reverse;
    opacity: 0.5;
  }

  @keyframes wave { from{transform:translateX(0)} to{transform:translateX(50%)} }

  .foam-dot {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,240,100,0.25);
    animation: floatdot 4s ease-in-out infinite;
  }
  @keyframes floatdot {
    0%,100% { transform: translateX(0) translateY(0); }
    33% { transform: translateX(3px) translateY(-2px); }
    66% { transform: translateX(-2px) translateY(-4px); }
  }

  .tank-pct { font-size: 11px; color: #665500; letter-spacing: 1px; }

  .info-panel { flex: 1; display: flex; flex-direction: column; gap: 8px; justify-content: center; }

  .big-pct {
    font-size: 58px; line-height: 1; letter-spacing: -2px;
    color: #c8a000;
    text-shadow: 0 0 12px rgba(200,160,0,0.4), 0 0 3px #ffcc00;
    transition: color 0.8s, text-shadow 0.8s;
  }
  .big-pct.warn { color: #e06000; text-shadow: 0 0 12px rgba(220,100,0,0.5), 0 0 3px #ff8800; }
  .big-pct.crit { color: #cc2200; text-shadow: 0 0 14px rgba(200,30,0,0.6); animation: flashred 1s step-end infinite; }
  @keyframes flashred { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .pct-sym { font-size: 28px; }

  .sub-label { font-size: 9px; color: #443300; letter-spacing: 2px; text-transform: uppercase; }
  .divider { height: 1px; background: #1e1a08; margin: 2px 0; }

  .bar-track { height: 5px; background: #100d00; border-radius: 3px; }
  .bar-fill {
    height: 100%; background: #c8a000; border-radius: 3px;
    transition: width 1.4s ease, background 0.8s;
    box-shadow: 0 0 5px rgba(200,160,0,0.4);
  }
  .bar-fill.warn { background: #e06000; box-shadow: 0 0 5px rgba(220,100,0,0.4); }
  .bar-fill.crit { background: #cc2200; box-shadow: 0 0 5px rgba(200,30,0,0.4); }

  .bar-markers { display: flex; justify-content: space-between; margin-top: 2px; }
  .bar-mark { font-size: 8px; color: #2a2000; }

  .meta-row { display: flex; flex-direction: column; gap: 3px; }
  .meta-line { display: flex; justify-content: space-between; }
  .meta-key { font-size: 9px; color: #2a2000; letter-spacing: 2px; }
  .meta-val { font-size: 10px; color: #665500; letter-spacing: 1px; }

  .status-text { font-size: 9px; letter-spacing: 2px; color: #2a2000; min-height: 12px; }
  .status-text.live-txt { color: #887700; }
  .status-text.err-txt  { color: #aa3300; }

  .scanlines {
    position: absolute; inset: 0; border-radius: 10px; pointer-events: none;
    background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
  }
</style>
</head>
<body>

<div class="shell">
  <div class="scanlines"></div>
  <div class="top-bar">
    <div class="title">ISS NODE 3 — URINE MONITOR</div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="main-panel">
    <div class="tank-wrap">
      <div class="tank-cap"></div>
      <div class="tank-outer">
        <div class="tank-glass-sheen"></div>
        <div class="tick" style="bottom:75%"></div><div class="tick-label" style="bottom:75%">75</div>
        <div class="tick" style="bottom:50%"></div><div class="tick-label" style="bottom:50%">50</div>
        <div class="tick" style="bottom:25%"></div><div class="tick-label" style="bottom:25%">25</div>
        <div class="urine-fill" id="urineFill" style="height:0%">
          <svg class="wave-svg" viewBox="0 0 200 16" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 8 Q25 2 50 8 Q75 14 100 8 Q125 2 150 8 Q175 14 200 8 L200 16 L0 16 Z" fill="#e0b800"/>
          </svg>
          <svg class="wave-svg wave2" viewBox="0 0 200 16" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 8 Q25 14 50 8 Q75 2 100 8 Q125 14 150 8 Q175 2 200 8 L200 16 L0 16 Z" fill="#c8a000"/>
          </svg>
          <div class="urine-body"></div>
          <div class="foam-dot" style="width:5px;height:5px;top:18px;left:10px;animation-delay:0s"></div>
          <div class="foam-dot" style="width:3px;height:3px;top:20px;left:28px;animation-delay:1.2s"></div>
          <div class="foam-dot" style="width:4px;height:4px;top:16px;left:38px;animation-delay:0.6s"></div>
        </div>
      </div>
      <div class="tank-pct" id="tankPctSmall">--%</div>
    </div>

    <div class="info-panel">
      <div>
        <div class="sub-label">URINE TANK</div>
        <div class="sub-label" style="font-size:8px;color:#2a1a00;margin-top:2px;">NODE3 / UPA PRETREAT</div>
      </div>
      <div>
        <span class="big-pct" id="bigPct">--</span><span class="big-pct pct-sym" id="bigPctSym">%</span>
      </div>
      <div class="divider"></div>
      <div class="bar-track">
        <div class="bar-fill" id="barFill" style="width:0%"></div>
      </div>
      <div class="bar-markers">
        <span class="bar-mark">0</span><span class="bar-mark">25</span>
        <span class="bar-mark">50</span><span class="bar-mark">75</span><span class="bar-mark">100</span>
      </div>
      <div class="meta-row">
        <div class="meta-line"><span class="meta-key">PARAM</span><span class="meta-val">NODE3000005</span></div>
        <div class="meta-line"><span class="meta-key">SOURCE</span><span class="meta-val">NASA / LIGHTSTREAMER</span></div>
        <div class="meta-line"><span class="meta-key">UPDATED</span><span class="meta-val" id="lastUpdate">--:--:--</span></div>
      </div>
      <div class="status-text" id="statusText">CONNECTING...</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/lightstreamer-client-web/lightstreamer.min.js"></script>
<script>
  function setLevel(pct) {
    pct = Math.min(100, Math.max(0, Math.round(pct * 10) / 10));
    const warn = pct >= 70, crit = pct >= 90;
    const cls  = crit ? ' crit' : warn ? ' warn' : '';

    document.getElementById('bigPct').textContent      = pct.toFixed(1);
    document.getElementById('bigPct').className        = 'big-pct' + cls;
    document.getElementById('bigPctSym').className     = 'big-pct pct-sym' + cls;
    document.getElementById('urineFill').style.height  = pct + '%';
    document.getElementById('barFill').style.width     = pct + '%';
    document.getElementById('barFill').className       = 'bar-fill' + cls;
    document.getElementById('tankPctSmall').textContent = pct.toFixed(1) + '%';
    document.getElementById('lastUpdate').textContent   = new Date().toTimeString().slice(0,8);

    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    dot.className  = 'status-dot live';
    txt.className  = 'status-text live-txt';
    txt.textContent = crit ? 'CRITICAL — DUMP REQUIRED'
                   : warn  ? 'WARNING — APPROACHING CAPACITY'
                           : 'LIVE TELEMETRY — NOMINAL';
  }

  function setError(msg) {
    document.getElementById('statusDot').className  = 'status-dot error';
    document.getElementById('statusText').className = 'status-text err-txt';
    document.getElementById('statusText').textContent = msg;
  }

  try {
    const client = new LightstreamerClient('https://push.lightstreamer.com', 'ISSLIVE');
    client.addListener({
      onStatusChange: function(status) {
        if (status.indexOf('DISCONNECTED') >= 0) setError('SIGNAL LOST');
      }
    });
    client.connect();

    const sub = new Subscription('MERGE', ['NODE3000005'], ['Value', 'Status.Class']);
    sub.setDataAdapter('DEFAULT');
    sub.setRequestedSnapshot('yes');
    sub.addListener({
      onItemUpdate: function(update) {
        const raw = update.getValue('Value');
        if (raw !== null && raw !== undefined && !isNaN(parseFloat(raw))) {
          setLevel(parseFloat(raw));
        }
      },
      onSubscriptionError: function(code) {
        setError('SUBSCRIPTION ERR ' + code);
      }
    });
    client.subscribe(sub);
  } catch(e) {
    setError('INIT ERROR');
  }
</script>

</body>
</html>
